<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="500" fill="url(#grad1)"/>
  
  <!-- Head -->
  <circle cx="200" cy="120" r="50" fill="#fdbcb4"/>
  
  <!-- Body -->
  <rect x="160" y="170" width="80" height="120" rx="10" fill="#1f2937"/>
  
  <!-- Arms -->
  <rect x="80" y="180" width="80" height="30" rx="15" fill="#fdbcb4"/>
  <rect x="240" y="180" width="80" height="30" rx="15" fill="#fdbcb4"/>
  
  <!-- Legs -->
  <rect x="170" y="290" width="25" height="100" rx="12" fill="#1f2937"/>
  <rect x="205" y="290" width="25" height="100" rx="12" fill="#1f2937"/>
  
  <!-- Text -->
  <text x="200" y="420" font-size="24" font-weight="bold" text-anchor="middle" fill="white">
    Investidor Matuto
  </text>
</svg>
